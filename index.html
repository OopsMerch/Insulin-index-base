    <title>Справочник Инсулинового Индекса</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0B0F19',
                        surface: '#1A2332',
                        surface_alt: '#222D40',
                        text_main: '#E2E8F0',
                        text_muted: '#94A3B8',
                        accent: '#38BDF8',
                        danger: '#F43F5E',
                        warning: '#FBBF24',
                        success: '#10B981',

                    fontFamily: {

                }

        }
    </script>
    <style>
        /* Base mobile-only optimization */
        body {
            background-color: #0B0F19;
            color: #E2E8F0;
            overflow-x: hidden;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0F19;
        }
        ::-webkit-scrollbar-thumb {
            background: #222D40;
            border-radius: 4px;
        }

        /* Smooth accordion transitions */
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 200px;
            opacity: 1;
        }

        /* Sticky header shadow on scroll */
        .header-scrolled {
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.5);
            border-bottom: 1px solid #222D40;
        }
        
        /* Search input reset */
        input[type="search"]::-webkit-search-decoration,
        input[type="search"]::-webkit-search-cancel-button,
        input[type="search"]::-webkit-search-results-button,
        input[type="search"]::-webkit-search-results-decoration {
            -webkit-appearance:none;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative pb-10">

    <!-- Chosen Palette: Deep Night Sky. Backgrounds (#0B0F19, #1A2332), Text (#E2E8F0, #94A3B8), Accents (Sky Blue, Emerald, Amber, Rose) -->
    <!-- Application Structure Plan: A strict mobile-first database list. Sticky header with real-time search ensures immediate accessibility. A highly optimized flat list using HTML/CSS without complex layouts prevents scrolling issues. Each item acts as an accordion to reveal research data without leaving the page or requiring modal management, keeping the UX fluid on small screens. -->
    <!-- Visualization & Content Choices: Report Info -> Goal -> Viz/Presentation Method -> Interaction -> Justification -> Library/Method. 
         Data (250 items) -> Easy search/compare -> Alphabetical Accordion List -> Tap to expand -> Best for mobile, keeps context -> Vanilla JS/Tailwind.

    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. Used Unicode for icons. -->

    <!-- Sticky Header -->

        <div class="flex items-center justify-between mb-3">
            <h1 class="text-xl font-bold text-accent tracking-wide">База<span class="text-text_main">ИИ</span></h1>
            <div class="text-xs font-semibold bg-surface_alt text-text_muted px-2 py-1 rounded-md">300+ ПРОДУКТОВ</div>
        </div>
        
        <p class="text-xs text-text_muted mb-3 leading-relaxed">
            Инсулиновый индекс — показатель выброса инсулина в ответ на еду. Ниже 40 — <span class="text-success">низкий</span>, 40-70 — <span class="text-warning">средний</span>, выше 70 — <span class="text-danger">высокий</span>.
        </p>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-text_muted">
                &#128269; <!-- Magnifying glass unicode -->
            </span>
            <input 
                type="search" 
                id="searchInput" 
                class="w-full bg-surface border border-surface_alt text-text_main text-sm rounded-xl focus:ring-2 focus:ring-accent focus:border-transparent block pl-10 p-3 placeholder-text_muted transition-all outline-none" 
                placeholder="Поиск продукта"
            >
        </div>
    </header>

            <p class="text-text_muted text-sm">Продукт не найден</p>
        </div>
    </main>

                            <div class="flex space-x-3 text-[10px] text-text_muted">
                                <span>ГИ: ${item.g}</span>
                                <span>Углеводы: ${item.c}г</span>
                            </div>
                        </div>
                        <div class="flex-shrink-0 text-center">
                            <div class="w-12 h-12 rounded-full border-2 ${colors} flex items-center justify-center font-bold text-lg">
                                ${item.i}
                            </div>
                            <span class="text-[9px] text-text_muted mt-1 block">ИИ</span>
                        </div>
                    </div>
                    <div id="item-${index}" class="accordion-content bg-[#151C28] px-4 border-t border-surface_alt">
                        <div class="py-3 text-xs">
                            <div class="flex items-start mb-2">
                                <span class="text-accent mr-2">&#128218;</span>
                                <div>
                                    <span class="text-text_muted block mb-1">Источник данных:</span>
                                    <span class="text-text_main italic font-medium">${item.s}</span>
                                </div>
                            </div>
                            <div class="text-text_muted mt-2 border-t border-[#222D40] pt-2">
                                Отношение ИИ к ГИ: 
                                ${item.i > item.g + 15 ? '<span class="text-warning">ИИ значительно выше ГИ (инсулиновый отклик не пропорционален сахару).</span>' : 'Нормальная корреляция.'}
                            </div>
                        </div>
                    </div>
                `;
                fragment.appendChild(li);
            });

            listContainer.appendChild(fragment);
        }

        // Accordion Toggle Logic
        let currentlyOpen = null;
        window.toggleAccordion = function(id) {
            const el = document.getElementById(id);
            if (currentlyOpen && currentlyOpen !== el) {
                currentlyOpen.classList.remove('open');
            }
            if (el.classList.contains('open')) {
                el.classList.remove('open');
                currentlyOpen = null;
            } else {
                el.classList.add('open');
                currentlyOpen = el;
            }
        };

        // Search Logic
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query === '') {
                renderList(db);
                return;
            }
            const filtered = db.filter(item => item.n.toLowerCase().includes(query));
            renderList(filtered);
        });

        // Sticky Header Shadow on Scroll
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                header.classList.add('header-scrolled');
            } else {
                header.classList.remove('header-scrolled');
            }
        }, { passive: true });

        // Initial Render
        renderList(db);

        // Prevent double-tap zoom on iOS
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
